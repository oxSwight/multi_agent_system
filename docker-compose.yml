services:

  # ──────────────────────────────────────────────────────────
  # PostgreSQL 16 — persistent data store
  # ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: midas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: midas_db
      POSTGRES_USER: ${MIDAS_DB_USERNAME:-midas}
      POSTGRES_PASSWORD: ${MIDAS_DB_PASSWORD:?MIDAS_DB_PASSWORD must be set}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - midas_pgdata:/var/lib/postgresql/data
    networks:
      - midas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MIDAS_DB_USERNAME:-midas} -d midas_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────────────────
  # Spring Boot backend
  # ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: midas_backend
    restart: unless-stopped
    # Give in-flight agent runs time to drain on redeploy (server.shutdown=graceful,
    # spring.lifecycle.timeout-per-shutdown-phase=120s). Slightly above the app timeout.
    stop_grace_period: 130s
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      # Alpine JRE image ships BusyBox wget; hit the readiness probe (verifies DB reachability).
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    environment:
      # Activate the production profile (INFO logging, no verbose internals).
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      # Database
      MIDAS_DB_URL: jdbc:postgresql://db:5432/midas_db
      MIDAS_DB_USERNAME: ${MIDAS_DB_USERNAME:-midas}
      MIDAS_DB_PASSWORD: ${MIDAS_DB_PASSWORD:?MIDAS_DB_PASSWORD must be set}

      # Security
      MIDAS_JWT_SECRET: ${MIDAS_JWT_SECRET:?MIDAS_JWT_SECRET must be set}

      # LLM client selection (NOUS = Ollama/OpenAI-compatible; GEMINI = Google AI Studio)
      MIDAS_LLM_CLIENT_TYPE: ${MIDAS_LLM_CLIENT_TYPE:-NOUS}
      MIDAS_LLM_BASE_URL: ${MIDAS_LLM_BASE_URL:-https://generativelanguage.googleapis.com}
      MIDAS_LLM_API_KEY: ${MIDAS_LLM_API_KEY:-}
      MIDAS_LLM_MODEL: ${MIDAS_LLM_MODEL:-qwen2.5-coder:14b}
      MIDAS_LLM_MODEL_CODE: ${MIDAS_LLM_MODEL_CODE:-qwen2.5-coder:14b}
      MIDAS_LLM_MODEL_TEST: ${MIDAS_LLM_MODEL_TEST:-qwen2.5-coder:14b}

      # Nous / OpenAI-compatible LLM (Ollama on host via host.docker.internal)
      MIDAS_NOUS_BASE_URL: ${MIDAS_NOUS_BASE_URL:-http://host.docker.internal:11434}
      MIDAS_NOUS_API_KEY: ${MIDAS_NOUS_API_KEY:-ollama-local-dev}
      MIDAS_NOUS_MODEL: ${MIDAS_NOUS_MODEL:-qwen2.5-coder:14b}
      MIDAS_NOUS_TIMEOUT_SECONDS: ${MIDAS_NOUS_TIMEOUT_SECONDS:-300}
      MIDAS_NOUS_MAX_RETRIES: ${MIDAS_NOUS_MAX_RETRIES:-2}
      MIDAS_NOUS_ROUTING_ENABLED: ${MIDAS_NOUS_ROUTING_ENABLED:-true}
      MIDAS_NOUS_ROUTING_DEFAULT_MODEL: ${MIDAS_NOUS_ROUTING_DEFAULT_MODEL:-qwen2.5-coder:14b}
      MIDAS_NOUS_MODEL_ENGINEERING: ${MIDAS_NOUS_MODEL_ENGINEERING:-qwen2.5-coder:14b}

      # Scheduler
      MIDAS_EVOLUTION_CRON: ${MIDAS_EVOLUTION_CRON:-0 0 * * * *}

      # Telegram (optional)
      MIDAS_TELEGRAM_ENABLED: ${MIDAS_TELEGRAM_ENABLED:-false}
      MIDAS_TELEGRAM_BOT_USERNAME: ${MIDAS_TELEGRAM_BOT_USERNAME:-midas_pipeline_bot}
      MIDAS_TELEGRAM_BOT_TOKEN: ${MIDAS_TELEGRAM_BOT_TOKEN:-}
    networks:
      - midas-network

  # ──────────────────────────────────────────────────────────
  # Next.js frontend dashboard
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./midas-dashboard
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time by Next.js.
        # Change to your VPS domain/IP for production.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    container_name: midas_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - midas-network

# ──────────────────────────────────────────────────────────
# Named volumes & networks
# ──────────────────────────────────────────────────────────
volumes:
  midas_pgdata:
    driver: local

networks:
  midas-network:
    driver: bridge

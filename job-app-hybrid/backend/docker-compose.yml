version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: jobapp_db
    environment:
      POSTGRES_DB: jobapp
      POSTGRES_USER: jobapp
      POSTGRES_PASSWORD: jobapp
    ports:
      - "5432:5432"
    volumes:
      - jobapp_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobapp -d jobapp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  jobapp_data:

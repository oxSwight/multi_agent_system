spring:
  application:
    name: midas-d3

  # ── Graceful shutdown ─────────────────────────────────────────────────────
  # On SIGTERM, stop accepting new requests but let in-flight work finish (up to the
  # timeout) instead of killing a 30–120s agent run mid-stage. Paired with server.shutdown
  # below and docker-compose stop_grace_period.
  lifecycle:
    timeout-per-shutdown-phase: 120s

  # ── Datasource (PostgreSQL) ───────────────────────────────────────────────
  datasource:
    url: ${MIDAS_DB_URL:jdbc:postgresql://localhost:5432/midas_db}
    username: ${MIDAS_DB_USERNAME:midas}
    password: ${MIDAS_DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: MidasHikariPool

  # ── JPA / Hibernate ───────────────────────────────────────────────────────
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # Schema is EXCLUSIVELY managed by Flyway migrations.
      # ddl-auto=validate ensures Hibernate verifies entity mappings against the
      # actual schema on startup without altering it — any mismatch is caught early.
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  # ── Flyway migrations ─────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

midas:
  # ── Security / JWT ────────────────────────────────────────────────────────
  security:
    jwt:
      # Base64-encoded HMAC-SHA256 signing key (minimum 256 bits).
      # OVERRIDE IN PRODUCTION via MIDAS_JWT_SECRET environment variable.
      # Default is for local development only — never use in production.
      secret: ${MIDAS_JWT_SECRET:c2VjcmV0c2VjcmV0c2VjcmV0c2VjcmV0c2VjcmV0c2VjcmV0}
    cors:
      # Comma-separated allowed browser origins for /api/**. Set your prod dashboard
      # origin(s) via MIDAS_CORS_ALLOWED_ORIGINS (e.g. https://app.example.com).
      allowed-origins: ${MIDAS_CORS_ALLOWED_ORIGINS:http://localhost:3000}

  context:
    max-artifact-size-kb: 512
  validation:
    max-retries: 3

  agent-retry:
    parse-max-attempts: ${MIDAS_AGENT_RETRY_PARSE_MAX:2}
    validation-max-attempts: ${MIDAS_AGENT_RETRY_VALIDATION_MAX:3}

  agent:
    # Pause (ms) before each agent invocation to respect cloud free-tier RPM limits. Default 10s for cloud
    # safety; set to 0 for LOCAL providers (Ollama/LM Studio) which have no RPM cap — avoids ~80s/run of
    # pooled worker threads held asleep.
    inter-agent-delay-ms: ${MIDAS_AGENT_INTER_AGENT_DELAY_MS:10000}

  finops:
    # Cloud list prices (USD per 1M tokens) applied ONLY to non-free models (see free-model-prefixes).
    # Defaults approximate Gemini 2.5 Flash.
    usd-per-million-prompt-tokens: ${MIDAS_FINOPS_USD_PER_M_PROMPT:0.075}
    usd-per-million-completion-tokens: ${MIDAS_FINOPS_USD_PER_M_COMPLETION:0.30}
    # Model-id prefixes (case-insensitive) treated as $0 — locally-hosted / self-hosted models with no
    # per-token cost. The default deployment runs local qwen, which must NOT be charged cloud prices.
    free-model-prefixes: ${MIDAS_FINOPS_FREE_MODEL_PREFIXES:qwen,llama,codellama,deepseek,mistral,mixtral,phi,gemma,ollama}

  # ── LLM client selection ───────────────────────────────────────────────────
  # client-type: GEMINI → GeminiLlmClient (Google AI Studio)
  # client-type: NOUS   → NousRestClient (OpenAI-compatible: Ollama, OpenRouter, LM Studio)
  llm:
    client-type: ${MIDAS_LLM_CLIENT_TYPE:NOUS}
    timeout-seconds: ${MIDAS_LLM_TIMEOUT_SECONDS:180}
    http-max-retries: ${MIDAS_LLM_HTTP_MAX_RETRIES:5}
    # Max in-memory size (MB) for a single LLM HTTP response body. Raised well above the WebFlux
    # 256KB codec default so large CODE_GENERATION/TEST_GENERATION responses don't crash the run;
    # an over-limit response fails fast (non-retryable) rather than burning the retry budget.
    max-response-mb: ${MIDAS_LLM_MAX_RESPONSE_MB:16}
    base-url: ${MIDAS_LLM_BASE_URL:https://generativelanguage.googleapis.com}
    api-key: ${MIDAS_LLM_API_KEY:}
    model: ${MIDAS_LLM_MODEL:qwen2.5-coder:14b}
    # Two-tier model policy. Heavy reasoning + critical gates stay on `model`; stages listed in
    # `fast-stages` drop to `fast-model` when it is set. Leave `fast-model` blank to disable
    # tier-down entirely (every stage uses `model`). Explicit `stage-models` pins always win.
    fast-model: ${MIDAS_LLM_FAST_MODEL:}
    fast-stages:
      - INTEGRATION_STRATEGY        # thin, skip-eligible, non-gate → safe to run on the cheap tier
    stage-models:
      CODE_GENERATION: ${MIDAS_LLM_MODEL_CODE:qwen2.5-coder:14b}
      TEST_GENERATION: ${MIDAS_LLM_MODEL_TEST:qwen2.5-coder:14b}

  # ── Nous / OpenAI-compatible LLM (NousRestClient — active when client-type: NOUS) ─
  # Ollama (Docker → host): base-url=http://host.docker.internal:11434  (NousRestClient appends /v1/chat/completions)
  # OpenRouter (cloud):     base-url=https://openrouter.ai/api           api-key=sk-or-...
  # LM Studio (local):      base-url=http://localhost:1234               api-key=  (leave empty)
  nous:
    base-url: ${MIDAS_NOUS_BASE_URL:http://host.docker.internal:11434}
    api-key: ${MIDAS_NOUS_API_KEY:ollama-local-dev}
    model: ${MIDAS_NOUS_MODEL:qwen2.5-coder:14b}
    timeout-seconds: ${MIDAS_NOUS_TIMEOUT_SECONDS:300}
    http-max-retries: ${MIDAS_NOUS_MAX_RETRIES:2}
    routing:
      enabled: ${MIDAS_NOUS_ROUTING_ENABLED:true}
      default-model: ${MIDAS_NOUS_ROUTING_DEFAULT_MODEL:qwen2.5-coder:14b}
      agents:
        SystemAnalystAgent: ${MIDAS_NOUS_MODEL_ENGINEERING:qwen2.5-coder:14b}
        SoftwareArchitectAgent: ${MIDAS_NOUS_MODEL_ENGINEERING:qwen2.5-coder:14b}
        ImplementationEngineerAgent: ${MIDAS_NOUS_MODEL_ENGINEERING:qwen2.5-coder:14b}
        QaAutomationAgent: ${MIDAS_NOUS_MODEL_ENGINEERING:qwen2.5-coder:14b}
        SecOpsAgent: ${MIDAS_NOUS_MODEL_ENGINEERING:qwen2.5-coder:14b}
        ControllerAgent: ${MIDAS_NOUS_MODEL_ENGINEERING:qwen2.5-coder:14b}

  # ── Evolution Agent (ContinuousImprovementService) ────────────────────────
  # cron: every hour on the hour; override for faster test cycles with fixedDelay
  # Set to "-" to disable the scheduler entirely.
  evolution:
    cron: ${MIDAS_EVOLUTION_CRON:0 0 * * * *}

  reaper:
    cron: ${MIDAS_REAPER_CRON:0 */15 * * * *}
    stale-timeout-minutes: ${MIDAS_REAPER_STALE_TIMEOUT_MINUTES:60}

  # ── Telegram Bot ──────────────────────────────────────────────────────────
  telegram:
    enabled: ${MIDAS_TELEGRAM_ENABLED:false}
    bot-username: ${MIDAS_TELEGRAM_BOT_USERNAME:midas_pipeline_bot}
    bot-token: ${MIDAS_TELEGRAM_BOT_TOKEN:}
    # Whitelist of Telegram chat IDs permitted to use the bot.
    # Leave empty (default) to allow any chat. When set, all other chats receive
    # a "⛔️ Доступ запрещен" reply and the pipeline is NOT started.
    # Add your Telegram chat IDs here locally, or leave empty to allow any chat.
    allowed-chat-ids: []

server:
  # Let the embedded server drain in-flight requests on shutdown (see spring.lifecycle above).
  shutdown: graceful

logging:
  level:
    # NOTE: DEBUG is for local development. Production activates the `prod` profile
    # (application-prod.yml) which lowers com.midas.d3 to INFO.
    com.midas.d3: DEBUG
    org.springframework.statemachine: INFO
    org.flywaydb: INFO
